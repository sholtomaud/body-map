<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BodyMap — Massage Therapy Assistant</title>
</head>
<body>
    <div id="app-container">
        <app-auth></app-auth>

        <div id="app-main" hidden>
            <app-topbar></app-topbar>

            <div class="main-layout">
                <app-sidebar></app-sidebar>

                <app-workspace>
                    <div slot="body" class="workspace-container">
                        <app-bodymap></app-bodymap>
                        <app-ai-assistant></app-ai-assistant>
                        <app-sessions hidden></app-sessions>
                        <app-profile hidden></app-profile>
                    </div>
                </app-workspace>
            </div>
        </div>
    </div>

    <app-client-modal></app-client-modal>
    <app-annotation-modal></app-annotation-modal>
    <app-save-session-modal></app-save-session-modal>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
