<!-- app-workspace template -->
<div class="workspace">
  <div class="workspace-header" id="workspace-header">
    <div id="header-client-info" style="display: none; align-items: center; gap: 12px; flex: 1">
      <div>
        <div class="workspace-client-name" id="ws-client-name"></div>
        <div style="font-size: 11px; color: var(--text3)" id="ws-client-id"></div>
      </div>

      <div class="header-controls">
        <label>Session mode:</label>
        <div class="mode-toggle">
          <div class="mode-btn active" id="mode-pre">Pre-treatment</div>
          <div class="mode-btn" id="mode-post">Post-treatment</div>
        </div>
        <div class="header-actions">
          <button class="btn btn-sm" id="btn-save">Save Session</button>
          <button class="btn btn-sm btn-danger" id="btn-clear">Clear</button>
        </div>
      </div>

      <div class="session-tabs">
        <div class="session-tab active" data-tab="bodymap">Body Map</div>
        <div class="session-tab" data-tab="sessions">Session History</div>
        <div class="session-tab" data-tab="profile">Profile</div>
      </div>
    </div>

    <div id="header-message" class="header-message">
      Select a client from the sidebar or create a new one to begin.
    </div>
  </div>

  <div class="workspace-body" id="workspace-body">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⊙</div>
      <div class="empty-title">No client selected</div>
    </div>

    <div id="tab-content" style="display: contents">
      <slot name="body"></slot>
    </div>
  </div>
</div>
